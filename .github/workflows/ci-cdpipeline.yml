name: Local CI/CD (self-hosted)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Build JAR
      - name: Build JAR
        run: mvn -B clean package -DskipTests

      # Step 4: Stop existing app (safe)
      - name: Stop existing app
        run: |
          pkill -f '/opt/springboot-app/app.jar' || true

      # Step 5: Prepare deployment folder
      - name: Prepare folder
        run: |
          mkdir -p /opt/springboot-app

      # Step 6: Copy JAR (ensure only one jar)
      - name: Copy JAR
        run: |
          JAR_FILE=$(ls target/*.jar | head -n 1)
          cp "$JAR_FILE" /opt/springboot-app/app.jar

      # Step 7: Start application
      - name: Start application
        run: |
          nohup java -jar /opt/springboot-app/app.jar > /opt/springboot-app/app.log 2>&1 &

      # Step 8: Verify
      - name: Verify app is running
        run: |
          sleep 5
          ps -ef | grep app.jar | grep -v grep