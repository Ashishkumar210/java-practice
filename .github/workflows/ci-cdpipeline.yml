name: Local CI/CD (self-hosted)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn -B clean package -DskipTests

      - name: Stop existing app
        run: |
          pkill -f 'java -jar' || true

      - name: Copy JAR to deployment folder
        run: |
          mkdir -p /opt/springboot-app
          cp target/*.jar /opt/springboot-app/app.jar

      - name: Start application
        run: |
          nohup java -jar /opt/springboot-app/app.jar > /opt/springboot-app/app.log 2>&1 &

      - name: Verify app is running
        run: |
          ps -ef | grep java